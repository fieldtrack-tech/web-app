name: "Web App — CodeQL (PR scan)"
# Lightweight CodeQL scan on every PR to master.
# security-extended queries only — fast feedback without blocking PRs with style issues.
# The deploy workflow depends on this workflow's name string — keep it stable.

on:
  pull_request:
    branches: ["master"]
    paths:
      - "web-app/src/**"
      - "web-app/public/**"
      - "web-app/package.json"
      - "web-app/package-lock.json"
      - "web-app/tsconfig.json"
      - "web-app/next.config.mjs"
      - "web-app/.github/workflows/**"

concurrency:
  group: web-codeql-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-lite:
    name: CodeQL Lite (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web-app

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build so CodeQL can trace data flows through transpiled output.
      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:3001' }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build || true

      # Initialize AFTER install + build so the database includes all sources.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "web-codeql-lite"
